
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
  db:
    image: postgres:15-alpine
    container_name: artrari-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: artrari
    ports:
      - "5433:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ../backend_source
    deploy:
      replicas: 3
    depends_on:
      - db
      - redis
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://artrari-db:5432/artrari
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      CLOUDINARY_URL: "cloudinary://585674141627634:dLa7raVu71BJTk8gayyu_nCqYHA@daxiid35t"
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
  
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
      - "63613:61613"
    entrypoint: ["sh", "-c", "rabbitmq-plugins enable --offline rabbitmq_stomp && docker-entrypoint.sh rabbitmq-server"]  
volumes:
  pgdata:
