events {
    worker_connections 1024;
}

http {
    upstream spring_api {
        # 'backend' — это имя сервиса из твоего docker-compose.yml
        # Nginx сам поймет, что там 3 реплики и будет распределять трафик
        server backend:8080; 
    }

    server {
        listen 80;

        # Проксируем обычные HTTP запросы
        location / {
            proxy_pass http://spring_api;
            
            # Передаем реальный IP пользователя в Spring Boot
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Проксируем WebSockets (жизненно важно для RabbitMQ STOMP)
        location /websocket {
            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
