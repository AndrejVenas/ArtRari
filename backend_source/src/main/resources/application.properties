spring.application.name=ArtRari

spring.datasource.url=jdbc:postgresql://localhost:5432/artrari
spring.datasource.username=postgres
spring.datasource.password=1234009
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database=postgresql

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expirationMs=14400000

app.pagination.default-size=12

spring.profiles.include=local

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Настройки Redis (хост берется из переменной окружения Docker, локально — localhost)
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=6379

# Настройки RabbitMQ для очередей и WebSocket-релея
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
